<!DOCTYPE html>
<html>
<head>
    <title>SchemeAssist AI</title>
</head>
<body>
    <h2>SchemeAssist AI – Government Scheme Recommendations</h2>

    <form id="userForm">
        <label>Age:</label><br>
        <input type="number" id="age"><br><br>

        <label>Annual Income:</label><br>
        <input type="number" id="income"><br><br>

        <label>State:</label><br>
        <input type="text" id="state"><br><br>

        <label>Category:</label><br>
        <input type="text" id="category"><br><br>

        <label>Gender:</label><br>
        <input type="text" id="gender"><br><br>

        <button type="button" onclick="getRecommendations()">
            Get Recommendations
        </button>
    </form>

    <h3>Results</h3>
    <pre id="output"></pre>

    <script>
    function getRecommendations() {
        const age = document.getElementById("age").value;
        const income = document.getElementById("income").value;
        const state = document.getElementById("state").value;
        const category = document.getElementById("category").value;
        const gender = document.getElementById("gender").value;

        if (!age || !income || !state || !category || !gender) {
            document.getElementById("output").textContent =
                "Please fill in all fields before submitting.";
            return;
        }

        const data = {
            age: parseInt(age),
            income: parseInt(income),
            state: state,
            category: category,
            gender: gender
        };

        fetch("http://127.0.0.1:5000/recommend", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        })
        .then(response => response.json())
        .then(result => {
            if (result.length === 0) {
        document.getElementById("output").textContent =
            "No eligible schemes found for the given profile.";
            } else {
        document.getElementById("output").textContent =
            JSON.stringify(result, null, 2);
            }
        });

    }
    </script>
</body>
</html>
